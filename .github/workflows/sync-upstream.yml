name: Upstream Sync

permissions:
  contents: write  # 允许写入分支（推送同步结果）

on:
  schedule:
    - cron: "0 4 * * *" # 每天中午 12 点（UTC+8）自动同步
  workflow_dispatch:      # 支持手动触发

jobs:
  sync_latest_from_upstream:
    name: Sync latest commits from upstream repo
    runs-on: ubuntu-latest
    if: ${{ github.event.repository.fork }}  # 仅在 fork 仓库运行

    steps:
      # Step 1: Checkout 当前仓库（你的 fork）
      - name: Checkout target repo
        uses: actions/checkout@v4

      # Step 2: 使用 Fork Sync Action 同步上游主分支
      - name: Sync upstream changes
        id: sync
        uses: aormsby/Fork-Sync-With-Upstream-action@v3.4.1
        with:
          upstream_sync_repo: eoao/cloud-mail  # ← 替换为上游仓库名
          upstream_sync_branch: main
          target_sync_branch: main
          target_repo_token: ${{ secrets.GITHUB_TOKEN }}
          allow_ff: false           # 是否只允许快进合并（建议 false，确保同步）
          reset_source_branch: true # 强制重置，使完全同步

      # Step 3: 同步失败时提醒你手动处理
      - name: Sync check
        if: failure()
        run: |
          echo "[Error] Sync failed. GitHub may have suspended scheduled workflows due to upstream changes."
          echo "Please trigger the workflow manually from the Actions tab."
          exit 1
