name: Sync Upstream

on:
  schedule:
    - cron: '0 2 * * *'  # 每天凌晨 2 点 UTC 自动同步
  workflow_dispatch:      # 允许手动触发

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout your fork
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: 🔗 Set up Git config
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: 📡 Add upstream
        run: git remote add upstream https://github.com/eoao/cloud-mail.git

      - name: 📥 Fetch upstream changes
        run: git fetch upstream

      - name: 🔀 Merge upstream/main into your fork
        run: |
          git checkout main
          git merge upstream/main --no-edit || echo "Nothing to merge"

      - name: 🚨 Trigger Deploy Workflow
        uses: peter-evans/workflow-dispatch@v1
        with:
          workflow: deploy-cloudflare.yml
