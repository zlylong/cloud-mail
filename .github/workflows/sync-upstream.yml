name: Sync Upstream

on:
  schedule:
    - cron: '0 2 * * *'  # 每天凌晨 2 点 UTC 自动同步
  workflow_dispatch:      # 支持手动触发

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout your fork
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0  # 获取完整历史，便于 reset

      - name: 🔗 Set up Git config
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: 📡 Add upstream
        run: git remote add upstream https://github.com/eoao/cloud-mail.git

      - name: 📥 Fetch upstream changes
        run: git fetch upstream

      - name: 🔄 Reset main to upstream/main
        run: |
          git checkout main
          git reset --hard upstream/main

      - name: ⬆️ Force push to your fork
        run: git push origin main --force
